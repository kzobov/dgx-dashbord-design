kind = "web"
previewPath = "/"
title = "⌘ Center"
version = "1.0.0"
id = "artifacts/cmd-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22999

[services.development]
run = "pnpm --filter @workspace/cmd-center run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cmd-center", "run", "build" ]
publicDir = "artifacts/cmd-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22999"
BASE_PATH = "/"
